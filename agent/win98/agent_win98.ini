profile=WIN98_LEGACY

# Grupo de sincronizaïŋ―ïŋ―o
group=default

# Modo de sincronizaïŋ―ïŋ―o: receive_only, send_only, bidirectional
sync_mode=bidirectional

# Codepage local de texto (1252 = Western European, padrïŋ―o do Win98 BR/PT/EN)
