# broker.ini — Configuração do ClipBrdComp Broker
# Copie para /etc/clipbrdcomp/broker.ini ou passe como argumento:
#   ./clipbrd_broker /etc/clipbrdcomp/broker.ini

[Network]
# Endereço de escuta (0.0.0.0 = todas as interfaces)
bind_address=0.0.0.0

# Porta TCP do broker
port=6543

# Máximo de conexões simultâneas
# -1 = sem limite (aceitar conexões indefinidamente)
max_connections=-1

# Intervalo de ping enviado ao cliente (segundos)
ping_interval_sec=30

# Timeout de pong antes de desconectar (segundos)
# Aumentado temporariamente para tolerar latências em Wine e ambientes lentos
# Ajuste para valores menores depois da investigação.
ping_timeout_sec=300

# Tamanho máximo do payload (MB)
max_payload_mb=4

[Security]
# Token compartilhado entre broker e todos os agentes
# TROQUE ANTES DE USAR EM PRODUÇÃO
auth_token=clipbrdcomp_secret_2025

# Permite conexões sem autenticação (apenas para testes)
allow_insecure=false

[Database]
# Caminho do banco SQLite
# Use caminho absoluto em produção
db_path=./broker.db
# db_path=/var/lib/clipbrdcomp/broker.db

[History]
# Manter histórico de clipboard no banco
enabled=true

# Número máximo de itens por grupo
max_items=50

[Logging]
# Arquivo de log (vazio = apenas console)
log_file=./broker.log
# log_file=/var/log/clipbrdcomp/broker.log

# Nível: debug, info, warn, error
log_level=info

# Log também no console
console=true
