name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Free Pascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
      - name: Build broker
        run: |
          fpc -v
          fpc -Fu../protocol -Fu../compat clipbrd_broker.lpr
