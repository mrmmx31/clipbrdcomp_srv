# compat_profiles.ini — Sobrescritas opcionais de perfis de compatibilidade
# Lido pelo broker para ajustar comportamento por perfil.
# Os valores abaixo são os padrões — edite apenas o que precisar mudar.

# Bitmask de formatos suportados (hexadecimal):
#   0x01 = FMT_TEXT_UTF8
#   0x02 = FMT_TEXT_ANSI
#   0x10 = FMT_IMAGE_PNG
#   0x20 = FMT_HTML_UTF8

# CapFlags (hexadecimal):
#   0x01 = suporta compressão
#   0x02 = suporta imagens
#   0x04 = suporta HTML
#   0x08 = bidirecional

[WIN98_LEGACY]
# Windows 98 / ME — texto ANSI, imagem DIB→PNG, sem HTML
formats=0x13
cap_flags=0x0A
max_payload_kb=4096

[WINNT_ANSI]
# Windows NT 4.0 / 2000 — texto ANSI+UTF8, imagens, sem HTML
formats=0x13
cap_flags=0x0A
max_payload_kb=8192

[LINUX_X11]
# Linux X11 — tudo habilitado
formats=0x33
cap_flags=0x0F
max_payload_kb=16384

[LINUX_WAYLAND_SESSION]
# Linux Wayland — igual ao X11 mas identidade separada
formats=0x33
cap_flags=0x0F
max_payload_kb=16384

[WINDOWS_MODERN_UNICODE]
# Windows XP+ / 10 / 11 — suporte completo Unicode
formats=0x33
cap_flags=0x0F
max_payload_kb=32768
