# agent_win98.ini ïŋ― Configuraïŋ―ïŋ―o do agente ClipBrdComp para Windows 98/ME
# Coloque no mesmo diretïŋ―rio do clipbrd_agent_w98.exe
# Ou passe como argumento na linha de comando.

[Network]
# IP ou hostname do broker (endereïŋ―o do computador Linux que roda o broker)
broker_host=192.168.1.16

# Porta TCP do broker
broker_port=6543

# Tempo entre tentativas de reconexïŋ―o (segundos)
reconnect_interval_sec=15

# Intervalo de ping keepalive (segundos)
